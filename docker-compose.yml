# POLARIS 배포 스택 — backend + frontend + 3DB 
# 데이터 적재는 pola CLI 로 
#
# 기동:  docker compose up -d --build
# 종료:  docker compose down            (볼륨 유지)
name: polaris

services:
  mariadb:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-polaris_root_dev_only}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-polaris}
      MARIADB_USER: ${MARIADB_USER:-polaris}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-polaris_dev_only}
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    ports: ["${MARIADB_HOST_PORT:-3307}:3306"]
    volumes: ["mariadb_data:/var/lib/mysql"]

  qdrant:
    image: qdrant/qdrant:v1.12.4
    restart: unless-stopped
    ports: ["${QDRANT_HTTP_PORT:-6333}:6333", "${QDRANT_GRPC_PORT:-6334}:6334"]
    volumes: ["qdrant_data:/qdrant/storage"]

  neo4j:
    image: neo4j:5.24-community
    restart: unless-stopped
    hostname: neo4j          # 컨테이너가 자기 호스트네임을 해소 못 해 기동 실패하는 문제 방지(/etc/hosts)
    environment:
      NEO4J_AUTH: "${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-polaris_dev_only}"
      NEO4J_PLUGINS: '["apoc"]'
    ports: ["${NEO4J_HTTP_PORT:-7474}:7474", "${NEO4J_BOLT_PORT:-7687}:7687"]
    volumes: ["neo4j_data:/data"]

  backend:
    build: ./backend
    profiles: ["full"]        # 기본 `docker compose up` 에선 제외. 풀스택: `docker compose --profile full up`
    restart: unless-stopped
    environment:
      MARIADB_HOST: mariadb
      MARIADB_PORT: "3306"                                  # 컨테이너 내부 포트(호스트 3307 매핑과 별개)
      MARIADB_USER: ${MARIADB_USER:-polaris}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-polaris_dev_only}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-polaris}
      QDRANT_HOST: qdrant
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-polaris_dev_only}
      CORS_ORIGINS: '["http://localhost","http://localhost:80"]'
    ports: ["${BACKEND_HOST_PORT:-8000}:8000"]
    depends_on: [mariadb, qdrant, neo4j]

  frontend:
    build: ../polaris-frontend     # 프론트 소스는 별도 레포(옆 폴더)
    profiles: ["full"]        # 기본 `docker compose up` 에선 제외. 풀스택: `docker compose --profile full up`
    restart: unless-stopped
    ports: ["${FRONTEND_HOST_PORT:-80}:80"]
    extra_hosts: ["host.docker.internal:host-gateway"]   # 컨테이너 → 호스트(백엔드) 접근용 (로컬엔 무해)
    depends_on: [backend]

volumes:
  mariadb_data:
  qdrant_data:
  neo4j_data: